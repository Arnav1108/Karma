[pytest]
markers =
    e2e: full pipeline end-to-end tests (real LLM + Postgres/Neo4j calls) - slow, opt-in via `pytest -m e2e`

# Default run (`pytest tests/`) excludes e2e; `pytest -m e2e` overrides this
# (pytest's -m is a plain store option, so an explicit -m on the command line
# wins over the one baked into addopts here).
addopts = -m "not e2e"

# INFO-level module logging (node1-node3 already log every load-bearing
# decision: band repairs, dead-end reasons, DDR4 bias, threshold values,
# verdict overrides) shows up in the "Captured log call" section on any
# test failure, without changing default-run verbosity via live streaming.
log_level = INFO
